[tool.poetry]
name = "gym-pybullet-drones"
version = "2.1.0"
description = "PyBullet Gym environments for single and multi-agent reinforcement learning of quadcopter control"
authors = ["Jacopo Panerati <jacopo.panerati@utoronto.ca>"]
license = "MIT"
readme = "README.md"
repository = "https://github.com/learnsyslab/gym-pybullet-drones"
packages = [
    { include = "gym_pybullet_drones" }
]

[tool.poetry.dependencies]
python = "^3.10"
numpy = ">=1.26,<2"
scipy = ">=1.11,<2"
transforms3d = "^0.4"
matplotlib = ">=3.8,<4"
pybullet-arm64 = ">=3.2.8,<4"
gymnasium = ">=0.29.1,<1.0"
stable-baselines3 = ">=2.2.1,<2.3"
control = "^0.10.2"

[tool.poetry.dev-dependencies]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
